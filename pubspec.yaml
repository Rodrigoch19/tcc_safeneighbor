name: safeneighbor
description: "Aplicativo SafeNeighbor - Navegação segura em tempo real"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # MAPA
  google_maps_flutter: ^2.17.0

  # GPS
  geolocator: ^11.0.0

  # CONVERTER LAT/LONG EM ENDEREÇO
  geocoding: ^3.0.0
  http: ^1.2.1

  # IA GEMINI
  google_generative_ai: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/safeneighbor_logo.png